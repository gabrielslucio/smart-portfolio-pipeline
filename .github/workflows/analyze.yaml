name: Smart Portfolio Automation

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Project ID
        required: true

      project_source:
        description: Project Source (Node or Local)
        required: true

      pipeline_type:
        description: Pipeline type
        required: true

      correlation_id:
        description: Correlation ID
        required: true

      project_name:
        description: Project Name
        required: true

      project_status:
        description: Project Status
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run analysis script
        run: |
          python scripts/analyze.py \
            "${{ github.event.inputs.project_id }}" \
            "${{ github.event.inputs.project_source }}" \
            "${{ github.event.inputs.pipeline_type }}" \
            "${{ github.event.inputs.correlation_id }}" \
            "${{ github.event.inputs.project_name }}" \
            "${{ github.event.inputs.project_status }}"
